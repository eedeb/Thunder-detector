name: Thunder watch

# Checks for thunder near Lampeter and updates the log.
on:
  schedule:
    - cron: "*/10 * * * *"   # every 10 minutes
  workflow_dispatch:          # allow manual runs from the Actions tab

# Only one run at a time so commits don't collide.
concurrency:
  group: thunder-watch
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check for thunder
        run: python scripts/check_thunder.py

      - name: Commit log if it changed
        run: |
          if [ -n "$(git status --porcelain thunder-log.json)" ]; then
            git config user.name  "thunder-bot"
            git config user.email "actions@github.com"
            git add thunder-log.json
            git commit -m "Update thunder log [skip ci]"
            git push
          else
            echo "No log change to commit."
          fi
